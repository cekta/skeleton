services:
  builder:
    build:
      context: ./
      target: dev
    volumes:
      - ./:/app
    command: [ "builder" ]
  
  app:
    build:
      context: ./
      target: dev
    tty: true
    volumes:
      - ./:/app
    ports:
      - "8080:8080"
    depends_on:
      builder:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "netstat -ltn | grep -c 8080" ]
      interval: 60s
      timeout: 1s
      retries: 10
      start_period: 10s
      start_interval: 1s
    command: [ "rr", "serve" ]

  db:
    image: postgres:18-alpine3.22
    environment:
      - PGUSER=postgres # user for pg_isready
      - POSTGRES_PASSWORD=cekta
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 60s
      timeout: 1s
      retries: 10
      start_period: 10s
      start_interval: 1s